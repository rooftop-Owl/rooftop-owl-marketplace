name: bump-pin
on:
  repository_dispatch:
    types: [plugin-updated]
jobs:
  bump:
    runs-on: ubuntu-latest
    concurrency:
      group: bump-pin
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Validate allowlist
        env:
          ALLOWED: "astraea skill-factory aeolus-agents dart-agents climada-agents wrf-chem-agents research-zotero slideaway notion-ao-research ephemeris"
          PLUGIN: ${{ github.event.client_payload.plugin }}
        run: |
          if ! echo "$ALLOWED" | grep -qw "$PLUGIN"; then
            echo "ERROR: plugin '$PLUGIN' not in allowlist" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Validate repo against marketplace.json source
        env:
          PLUGIN: ${{ github.event.client_payload.plugin }}
          REPO: ${{ github.event.client_payload.repo }}
        run: |
          EXPECTED_REPO=$(jq -r --arg name "$PLUGIN"             '.plugins[] | select(.name==$name) | .source.url
             | ltrimstr("https://github.com/") | rtrimstr(".git")'             .claude-plugin/marketplace.json)
          if [ -z "$EXPECTED_REPO" ]; then
            echo "ERROR: plugin '$PLUGIN' not found in marketplace.json" >&2
            exit 1
          fi
          if [ "$REPO" != "$EXPECTED_REPO" ]; then
            echo "ERROR: repo '$REPO' does not match marketplace source '$EXPECTED_REPO'" >&2
            exit 1
          fi

      - name: Patch and push marketplace.json
        env:
          PLUGIN: ${{ github.event.client_payload.plugin }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          COUNT=$(jq --arg name "$PLUGIN" '[.plugins[] | select(.name==$name)] | length' .claude-plugin/marketplace.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: plugin '$PLUGIN' not found in marketplace.json" >&2
            exit 1
          fi
          jq --arg name "$PLUGIN" --arg sha "$SHA"              '(.plugins[] | select(.name==$name) | .source.sha) = $sha'              .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(marketplace): bump ${PLUGIN} to ${SHA}"
          git push
